<style>
  /* ... previous styles ... */
  #winner-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); z-index: 5000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; animation: fadeIn 0.5s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .win-title { font-size: 3rem; font-weight: 900; margin: 0; }
  .mvp-box { background: #ffd54f; color: black; padding: 15px 30px; border-radius: 10px; margin: 20px 0; font-weight: 900; }
</style>

<div id="winner-overlay">
  <h2 id="win-team-text" class="win-title">RED WINS!</h2>
  <div class="mvp-box">MVP: <span id="mvp-name">PLAYER</span></div>
  <button class="main-btn" style="width: 200px;" onclick="closeWinner()">NEW MATCH</button>
</div>

<script type="module">
  /* ... existing Firebase setup ... */

  // UPDATED handleNextClick with MVP and Winner Logic
  window.handleNextClick = () => {
    if(!isAdmin) return;
    for(let i=0; i<4; i++) totals[i] += parseInt(document.getElementById('bid-'+i).getAttribute('data-last'));
    history.push({rd: round, s: [...totals]});
    
    let winT1 = ( (totals[0] >= 41 && totals[2] >= 0) || (totals[2] >= 41 && totals[0] >= 0) );
    let winT2 = ( (totals[1] >= 41 && totals[3] >= 0) || (totals[3] >= 41 && totals[1] >= 0) );
    
    if(winT1 || winT2) {
      let winningTeamIdx = -1;
      if(winT1 && winT2) {
          let max1 = Math.max(totals[0], totals[2]);
          let max2 = Math.max(totals[1], totals[3]);
          winningTeamIdx = (max1 > max2) ? 0 : 1;
      } else {
          winningTeamIdx = winT1 ? 0 : 1;
      }
      
      teamWins[winningTeamIdx]++;
      let target = Math.ceil(matchLimit/2);

      if(teamWins[winningTeamIdx] >= target) {
          showMatchWinner(winningTeamIdx);
      } else {
          alert("GAME OVER! Next game starting...");
          manualReset();
      }
      return;
    }

    round++; dealerIdx = (dealerIdx + 1) % 4; bidsLocked = false; resetBoard(); pushState();
  };

  function showMatchWinner(teamIdx) {
    const overlay = document.getElementById('winner-overlay');
    const teamText = document.getElementById('win-team-text');
    const mvpText = document.getElementById('mvp-name');
    
    const teamColor = teamIdx === 0 ? "#d32f2f" : "#ffd54f";
    const teamName = teamIdx === 0 ? "RED TEAM" : "BLACK TEAM";
    
    // Calculate MVP from the winning team
    let p1 = teamIdx === 0 ? 0 : 1;
    let p2 = teamIdx === 0 ? 2 : 3;
    let mvpIdx = (totals[p1] >= totals[p2]) ? p1 : p2;
    let mvpName = document.getElementById('name-' + mvpIdx).value;

    teamText.innerText = teamName + " WINS!";
    teamText.style.color = teamColor;
    mvpText.innerText = mvpName;
    overlay.style.display = 'flex';
    
    // Push the state so other players see the win
    pushState();
  }

  window.closeWinner = () => {
    document.getElementById('winner-overlay').style.display = 'none';
    manualHardReset();
  };
</script>
