<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>400 PRO - ELITE EDITION</title>
  <style>
    body { margin: 0; padding: 0; background: #0b5b2e; font-family: sans-serif; color: white; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
    
    /* MATCH HEADER */
    #match-header { position: fixed; top: 0; width: 100%; background: #064020; border-bottom: 3px solid #ffd54f; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; padding: 0 15px; box-sizing: border-box; }
    .score-box { min-width: 55px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; color: #fff; }
    .bg-red { background: #d32f2f; border: 2px solid white; }
    .bg-black { background: #000; border: 2px solid #555; }
    .match-type-select { background: transparent; color: #ffd54f; border: none; font-weight: 900; font-size: 0.9rem; outline: none; cursor: pointer; text-align: center; -webkit-appearance: none; }
    
    /* ADMIN CONTROLS */
    .top-ctrl { position: fixed; top: 68px; width: 100%; height: 40px; z-index: 1100; pointer-events: none; padding: 0 10px; box-sizing: border-box; }
    .reset-select { position: absolute; left: 10px; height: 35px; width: 85px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; cursor: pointer; pointer-events: auto; background: #111; color: #ffd54f; border: 2px solid #ffd54f; text-transform: uppercase; }
    .alz-btn { position: absolute; right: 10px; height: 35px; width: 85px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; cursor: pointer; pointer-events: auto; background: #ff5252; color: white; border: 2px solid white; text-transform: uppercase; }
    .admin-only { display: none; }

    /* TABLE AREA */
    .table-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-table { position: relative; width: 85vw; height: 85vw; max-width: 400px; max-height: 400px; background: radial-gradient(circle, #0f7b3c 0, #064020 85%); border-radius: 50%; }
    .center-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 10px; border-radius: 15px; text-align: center; width: 95px; border: 2px solid #ffd54f; z-index: 100; }
    .main-btn { background: #ffd54f; color: black; border: none; border-radius: 5px; font-weight: 900; width: 100%; margin: 4px 0; font-size: 0.85rem; padding: 12px 0; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
    .main-btn:disabled { opacity: 0.3 !important; }

    /* PLAYER PANELS */
    .player-panel { position: absolute; border-radius: 12px; width: 120px; height: 180px; text-align: center; display: flex; flex-direction: column; box-shadow: 0 6px 15px rgba(0,0,0,0.5); z-index: 200; border: 1px solid #ccc; overflow: hidden; }
    .team-red { background: #fff5f5; }
    .team-black { background: #f4f4f4; }
    .p-right { top: 50%; right: 7px; transform: translateY(-50%); }
    .p-left { top: 50%; left: 7px; transform: translateY(-50%); }
    .p-top { top: 104px; left: 50%; transform: translateX(-50%); }
    .p-bottom { bottom: 104px; left: 50%; transform: translateX(-50%); }

    .p-name { border: none; background: transparent; font-weight: 900; width: 100%; font-size: 0.85rem; text-align: center; color: #333; padding: 8px 0; outline: none; }
    .bid-sel { width: 90%; margin: 0 auto; height: 28px; font-weight: bold; font-size: 1.1rem; }
    .res-group { display: flex; justify-content: center; gap: 6px; margin: 4px 0; }
    .res-btn { width: 40px; height: 40px; border-radius: 6px; font-weight: 900; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .win-active { background: #2e7d32 !important; color: white; }
    .loss-active { background: #d32f2f !important; color: white; }
    .p-tot-display { font-size: 1.9rem; font-weight: 900; background: rgba(0,0,0,0.05); margin-top: auto; padding: 8px 0; border-radius: 0 0 12px 12px; color: #333; border-top: 1px solid rgba(0,0,0,0.1); }
    .dealer-active-score { background: #ffd54f !important; color: #000 !important; }

    /* HISTORY */
    .history-section { background: #000; border-top: 4px solid #ffd54f; padding: 20px 10px 100px 10px; }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th { color: #ffd54f; padding: 12px; font-size: 0.8rem; border-bottom: none; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 1.1rem; }
    .void-row td { text-decoration: line-through !important; color: #ff5252 !important; opacity: 0.4; font-style: italic; }
  </style>
</head>
<body>

  <div id="match-header">
    <div style="display:flex; align-items:center; gap:5px;"><span style="color:#ffd54f;font-weight:900">RED</span><div class="score-box bg-red" id="m1">0</div></div>
    <select class="match-type-select" id="match-type" onchange="window.changeMatchType(this.value)">
      <option value="1">SINGLE</option>
      <option value="3">BO3</option>
      <option value="5">BO5</option>
    </select>
    <div style="display:flex; align-items:center; gap:5px;"><div class="score-box bg-black" id="m2">0</div><span style="color:#ffd54f;font-weight:900">BLACK</span></div>
  </div>

  <div class="top-ctrl admin-only">
    <select class="reset-select" id="reset-dropdown" onchange="window.handleReset(this)">
        <option value="">MENU</option>
        <option value="undo">UNDO LAST RD</option>
        <option value="game">NEW GAME</option>
        <option value="match">NEW MATCH</option>
    </select>
    <button class="alz-btn" onclick="window.moveDealer()">ALZHEIMER</button>
  </div>

  <div class="table-container">
    <div class="card-table">
      <div class="center-panel">
        <div id="rd-info" style="color:#ffd54f; font-weight:bold; font-size: 0.75rem; margin-bottom: 4px;">RD 1</div>
        <button id="bid-btn" class="main-btn admin-only" onclick="window.toggleBid()">BID</button>
        <button id="calc-btn" class="main-btn admin-only" onclick="window.doCalc()" disabled>CALC</button>
        <button id="next-btn" class="main-btn admin-only" onclick="window.handleNextClick()" disabled>NEXT</button>
      </div>
    </div>

    <div class="player-panel team-red p-right" id="panel-0">
        <input type="text" id="name-0" class="p-name" style="color:#d32f2f" onchange="window.syncName(0, this.value)">
        <select id="bid-0" class="bid-sel"></select>
        <div class="res-group">
            <button class="res-btn" id="w-0" onclick="window.setRes(0,'w')">W</button>
            <button class="res-btn" id="l-0" onclick="window.setRes(0,'l')">L</button>
        </div>
        <div class="p-tot-display" id="tot-0">0</div>
    </div>
    <div class="player-panel team-red p-left" id="panel-2">
        <input type="text" id="name-2" class="p-name" style="color:#d32f2f" onchange="window.syncName(2, this.value)">
        <select id="bid-2" class="bid-sel"></select>
        <div class="res-group">
            <button class="res-btn" id="w-2" onclick="window.setRes(2,'w')">W</button>
            <button class="res-btn" id="l-2" onclick="window.setRes(2,'l')">L</button>
        </div>
        <div class="p-tot-display" id="tot-2">0</div>
    </div>

    <div class="player-panel team-black p-top" id="panel-1">
        <input type="text" id="name-1" class="p-name" onchange="window.syncName(1, this.value)">
        <select id="bid-1" class="bid-sel"></select>
        <div class="res-group">
            <button class="res-btn" id="w-1" onclick="window.setRes(1,'w')">W</button>
            <button class="res-btn" id="l-1" onclick="window.setRes(1,'l')">L</button>
        </div>
        <div class="p-tot-display" id="tot-1">0</div>
    </div>
    <div class="player-panel team-black p-bottom" id="panel-3">
        <input type="text" id="name-3" class="p-name" onchange="window.syncName(3, this.value)">
        <select id="bid-3" class="bid-sel"></select>
        <div class="res-group">
            <button class="res-btn" id="w-3" onclick="window.setRes(3,'w')">W</button>
            <button class="res-btn" id="l-3" onclick="window.setRes(3,'l')">L</button>
        </div>
        <div class="p-tot-display" id="tot-3">0</div>
    </div>
  </div>

  <div class="history-section">
    <table><thead><tr><th>RD</th><th id="th-0"></th><th id="th-1"></th><th id="th-2"></th><th id="th-3"></th></tr></thead><tbody id="hist-body"></tbody></table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyC9bc2wY9HkQW9k5Ln-ha7hm0IQr_nHX7s", 
        authDomain: "score-400-33dc7.firebaseapp.com", 
        databaseURL: "https://score-400-33dc7-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "score-400-33dc7" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, 'github_liveGame');
    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
    if(isAdmin) document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');

    let round=1, totals=[0,0,0,0], teamWins=[0,0], dealerIdx=3, history=[], bidsLocked=false, matchLimit=1, currentBids=[2,2,2,2], roundRes=[null,null,null,null], playerNames=["WAEL", "AMER", "MOHAMAD", "AKRAM"], calcApplied=false;

    onValue(stateRef, (s) => {
      const d = s.val(); if (!d) return;
      round = d.round || 1; totals = d.totals || [0,0,0,0]; teamWins = d.teamWins || [0,0]; dealerIdx = d.dealerIdx ?? 3; 
      history = d.history || []; matchLimit = d.matchLimit || 1; bidsLocked = d.bidsLocked || false; 
      currentBids = d.currentBids || [2,2,2,2]; roundRes = d.roundRes || [null,null,null,null];
      playerNames = d.playerNames || ["WAEL", "AMER", "MOHAMAD", "AKRAM"]; calcApplied = d.calcApplied || false;

      document.getElementById('m1').innerText = teamWins[0]; 
      document.getElementById('m2').innerText = teamWins[1];
      document.getElementById('match-type').value = matchLimit;
      document.getElementById('rd-info').innerText = `RD ${round}`;

      for(let i=0; i<4; i++) {
        document.getElementById('name-'+i).value = playerNames[i];
        document.getElementById('th-'+i).innerText = playerNames[i].substring(0,4).toUpperCase();
        document.getElementById('tot-'+i).innerText = totals[i];
        document.getElementById('tot-'+i).classList.toggle('dealer-active-score', i === dealerIdx);
        
        const bSel = document.getElementById('bid-'+i);
        bSel.innerHTML = '';
        for(let j=2; j<=10; j++) {
            let o = document.createElement('option'); o.value=j; o.innerText=j; bSel.appendChild(o);
        }
        bSel.value = currentBids[i];
        bSel.disabled = !isAdmin || bidsLocked;

        document.getElementById('w-'+i).className = 'res-btn' + (roundRes[i] === 'w' ? ' win-active' : '');
        document.getElementById('l-'+i).className = 'res-btn' + (roundRes[i] === 'l' ? ' loss-active' : '');
      }

      document.getElementById('bid-btn').innerText = bidsLocked ? "REBID" : "BID";
      document.getElementById('calc-btn').disabled = !bidsLocked || calcApplied;
      document.getElementById('next-btn').disabled = !calcApplied;
      renderHistory();
    });

    window.syncName = (i, v) => { if(isAdmin) { playerNames[i] = v.toUpperCase(); pushState(); } };
    window.setRes = (i, t) => { if(!isAdmin || !bidsLocked || calcApplied) return; roundRes[i] = t; pushState(); };
    window.moveDealer = () => { if(isAdmin) { dealerIdx = (dealerIdx + 1) % 4; pushState(); } };
    window.changeMatchType = (v) => { if(isAdmin) { matchLimit = parseInt(v); pushState(); } };

    window.toggleBid = () => {
        if(!isAdmin) return;
        if(!bidsLocked) {
            for(let i=0; i<4; i++) currentBids[i] = parseInt(document.getElementById('bid-'+i).value);
            roundRes = ['w','w','w','w'];
            bidsLocked = true;
        } else {
            bidsLocked = false;
            calcApplied = false;
        }
        pushState();
    };

    window.doCalc = () => {
        if(!isAdmin) return;
        for(let i=0; i<4; i++) {
            let b = currentBids[i];
            if(roundRes[i] === 'w') totals[i] += b;
            else totals[i] -= b;
        }
        history.push({ rd: round, s: [...totals] });
        calcApplied = true;
        pushState();
        checkWinner();
    };

    window.handleNextClick = () => {
        if(!isAdmin) return;
        round++;
        dealerIdx = (dealerIdx + 1) % 4;
        bidsLocked = false;
        calcApplied = false;
        pushState();
    };

    function checkWinner() {
        let rSum = totals[0] + totals[2];
        let bSum = totals[1] + totals[3];
        if(rSum >= 41 || bSum >= 41) {
            if(rSum > bSum) teamWins[0]++;
            else teamWins[1]++;
            alert("GAME OVER!");
            window.handleReset({value: 'game'});
        }
    }

    window.handleReset = (sel) => {
        if(!isAdmin) return;
        const action = sel.value;
        if (action === "undo" && history.length > 0) {
            history.pop();
            totals = history.length > 0 ? [...history[history.length - 1].s] : [0,0,0,0];
            round = Math.max(1, round - 1);
            dealerIdx = (dealerIdx - 1 + 4) % 4;
            bidsLocked = false; calcApplied = false;
        } else if (action === "game") {
            round = 1; totals = [0,0,0,0]; history = []; bidsLocked = false; calcApplied = false;
        } else if (action === "match") {
            round = 1; totals = [0,0,0,0]; teamWins = [0,0]; history = []; bidsLocked = false; calcApplied = false;
        }
        sel.value = "";
        pushState();
    };

    function pushState() { set(stateRef, { round, totals, teamWins, dealerIdx, history, matchLimit, bidsLocked, currentBids, roundRes, playerNames, calcApplied }); }
    
    function renderHistory() {
      const b = document.getElementById('hist-body'); b.innerHTML = '';
      history.forEach(h => {
        b.innerHTML += `<tr><td>${h.rd}</td><td>${h.s[0]}</td><td>${h.s[1]}</td><td>${h.s[2]}</td><td>${h.s[3]}</td></tr>`;
      });
    }
  </script>
</body>
</html>
