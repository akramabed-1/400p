<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>400 PRO - ELITE EDITION</title>
  <style>
    body { margin: 0; padding: 0; background: #0b5b2e; font-family: sans-serif; color: white; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
    #match-header { position: fixed; top: 0; width: 100%; background: #064020; border-bottom: 3px solid #ffd54f; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; padding: 0 15px; box-sizing: border-box; }
    .score-box { min-width: 55px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; color: #fff; }
    .bg-red { background: #d32f2f; border: 2px solid white; }
    .bg-black { background: #000; border: 2px solid #555; }
    .match-type-select { background: transparent; color: #ffd54f; border: none; font-weight: 900; font-size: 0.9rem; outline: none; cursor: pointer; text-align: center; -webkit-appearance: none; }
    .admin-only { display: none; }
    
    #warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .warning-text { font-size: 3.5rem; font-weight: 900; color: #ff5252; margin: 0; text-transform: uppercase; }
    .warning-subtext { color: white; font-size: 1.2rem; margin: 10px 0 30px 0; font-weight: bold; }

    #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .game-over-card { background: white; width: 90%; max-width: 340px; border-radius: 25px; padding: 30px 20px; text-align: center; color: #333; box-shadow: 0 10px 50px rgba(0,0,0,0.8); border: 4px solid #ffd54f; }
    .card-title { font-size: 2rem; font-weight: 900; margin: 0; text-transform: uppercase; }
    .winning-team-name { font-size: 1.5rem; font-weight: 900; margin: 10px 0 20px 0; text-transform: uppercase; color: #000; }
    .mvp-list { background: #f4f4f4; border-radius: 15px; padding: 15px; text-align: left; margin-bottom: 25px; }
    .player-row { font-size: 1.2rem; font-weight: 900; padding: 10px 0; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
    .player-row:last-child { border-bottom: none; }
    .mvp-badge { background: #ffd54f; color: #000; font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; margin-left: 8px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    
    .overlay-btns { display: flex; gap: 10px; margin-top: 10px; }
    .ok-btn { background: #000; color: #fff; border: none; flex: 1; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
    .cheer-btn-overlay { background: #ffd54f; color: #000; border: none; flex: 1; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 900; cursor: pointer; border: 2px solid #000; }

    .top-ctrl { position: fixed; top: 68px; width: 100%; height: 40px; z-index: 1100; pointer-events: none; display: flex; justify-content: space-between; padding: 0 10px; width: calc(100% - 20px); }
    .alz-btn, .reset-select { height: 35px; width: 85px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; cursor: pointer; pointer-events: auto; outline: none; text-transform: uppercase; }
    .alz-btn { background: #ff5252; color: white; border: 2px solid white; }
    .reset-select { background: #111; color: #ffd54f; border: 2px solid #ffd54f; }
    
    .bottom-right-ctrl { position: fixed; bottom: 25px; right: 15px; z-index: 1100; }
    .voice-btn { height: 45px; width: 85px; border-radius: 6px; font-weight: 900; font-size: 0.8rem; cursor: pointer; background: #111; color: #42a5f5; border: 2px solid #42a5f5; outline: none; text-transform: uppercase; }

    .table-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-table { position: relative; width: 85vw; height: 85vw; max-width: 400px; max-height: 400px; background: radial-gradient(circle, #0f7b3c 0, #064020 85%); border-radius: 50%; }
    .center-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 10px; border-radius: 15px; text-align: center; width: 95px; border: 2px solid #ffd54f; z-index: 100; }
    .main-btn { background: #ffd54f; color: black; border: none; border-radius: 5px; font-weight: 900; width: 100%; margin: 4px 0; font-size: 0.85rem; padding: 12px 0; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; line-height: 1; }

    .player-panel { position: absolute; border-radius: 12px; width: 120px; height: 180px; text-align: center; display: flex; flex-direction: column; box-shadow: 0 6px 15px rgba(0,0,0,0.5); z-index: 200; border: 1px solid #ccc; overflow: hidden; }
    .team-red { background: #fff5f5; }
    .team-black { background: #f4f4f4; }
    .p-right { top: 50%; right: 7px; transform: translateY(-50%); }
    .p-left { top: 50%; left: 7px; transform: translateY(-50%); }
    .p-top { top: 104px; left: 50%; transform: translateX(-50%); }
    .p-bottom { bottom: 104px; left: 50%; transform: translateX(-50%); }

    .p-name { border: none; background: transparent; font-weight: 900; width: 100%; font-size: 0.85rem; text-align: center; color: #333; padding: 8px 0; }
    .bid-sel { width: 90%; margin: 0 auto; height: 28px; font-weight: bold; font-size: 1.1rem; color: #000; }
    .res-group { display: flex; justify-content: center; gap: 6px; margin: 4px 0; }
    .res-btn { width: 40px; height: 40px; border-radius: 6px; font-weight: 900; border: 1px solid #ccc; background: #fff; cursor: pointer; color: #333; }
    .win-active { background: #2e7d32 !important; color: white !important; border-color: #2e7d32 !important; }
    .loss-active { background: #d32f2f !important; color: white !important; border-color: #d32f2f !important; }
    .p-tot-display { font-size: 1.9rem; font-weight: 900; background: rgba(0,0,0,0.05); margin-top: auto; padding: 8px 0; border-radius: 0 0 12px 12px; color: #333; border-top: 1px solid rgba(0,0,0,0.1); }
    .dealer-active-score { background: #ffd54f !important; color: #000 !important; }

    .history-section { background: #000; border-top: 4px solid #ffd54f; padding: 20px 10px 100px 10px; }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th { color: #ffd54f; padding: 12px; border-bottom: 1px solid #333; font-size: 0.8rem; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div id="warning-overlay">
    <h1 class="warning-text">INVALID!</h1>
    <p id="warning-msg" class="warning-subtext">MINIMUM BID REQUIRED: 11</p>
    <button class="ok-btn" style="width:160px" onclick="closeWarning()">OK</button>
  </div>

  <div id="winner-overlay">
    <div class="game-over-card">
      <h2 class="card-title" id="overlay-title">🏁 GAME OVER</h2>
      <div class="winning-team-name" id="win-team-label">TEAM BLACK</div>
      <div class="mvp-list" id="mvp-list-container"></div>
      <div class="overlay-btns">
        <button class="cheer-btn-overlay" onclick="playCheer()">🎉 HURRAY</button>
        <button class="ok-btn" id="overlay-close-btn" onclick="closeWinnerOverlay()">OK</button>
      </div>
    </div>
  </div>

  <div id="match-header">
    <div style="display:flex; align-items:center; gap:5px;"><span style="color:#ffd54f;font-weight:900">RED</span><div class="score-box bg-red" id="m1">0</div></div>
    <select class="match-type-select" id="match-type" onchange="changeMatchType(this.value)">
      <option value="1">SINGLE</option>
      <option value="3">BO3</option>
      <option value="5">BO5</option>
    </select>
    <div style="display:flex; align-items:center; gap:5px;"><div class="score-box bg-black" id="m2">0</div><span style="color:#ffd54f;font-weight:900">BLACK</span></div>
  </div>

  <div class="top-ctrl admin-only">
    <select class="reset-select" onchange="handleReset(this)"><option value="">RESET</option><option value="game">NEW GAME</option><option value="match">NEW MATCH</option></select>
    <button class="alz-btn" onclick="moveDealer()">ALZHEIMER</button>
  </div>

  <div class="bottom-right-ctrl">
    <button class="voice-btn" onclick="announceScore()">VOICE</button>
  </div>

  <div class="table-container">
    <div class="card-table">
      <div class="center-panel">
        <div id="rd-info" style="color:#ffd54f; font-weight:bold; font-size: 0.75rem; margin-bottom: 4px;">RD 1 [11]</div>
        <button id="bid-btn" class="main-btn admin-only" onclick="toggleBid()">BID</button>
        <button id="calc-btn" class="main-btn admin-only" onclick="doCalc()" disabled style="opacity:0.4">CALC</button>
        <button id="next-btn" class="main-btn admin-only" onclick="handleNextClick()" disabled style="opacity:0.4">NEXT</button>
      </div>
    </div>

    <div class="player-panel team-red p-right" id="panel-0"><input type="text" value="MOHAMAD" id="name-0" class="p-name" style="color:#d32f2f"><select id="bid-0" class="bid-sel"></select><div class="res-group"><button class="res-btn" id="w-0" onclick="setRes(0,'w')">W</button><button class="res-btn" id="l-0" onclick="setRes(0,'l')">L</button></div><div id="pop-0" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-0">0</div></div>
    <div class="player-panel team-red p-left" id="panel-2"><input type="text" value="WAEL" id="name-2" class="p-name" style="color:#d32f2f"><select id="bid-2" class="bid-sel"></select><div class="res-group"><button class="res-btn" id="w-2" onclick="setRes(2,'w')">W</button><button class="res-btn" id="l-2" onclick="setRes(2,'l')">L</button></div><div id="pop-2" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-2">0</div></div>
    <div class="player-panel team-black p-top" id="panel-1"><input type="text" value="AMER" id="name-1" class="p-name"><select id="bid-1" class="bid-sel"></select><div class="res-group"><button class="res-btn" id="w-1" onclick="setRes(1,'w')">W</button><button class="res-btn" id="l-1" onclick="setRes(1,'l')">L</button></div><div id="pop-1" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-1">0</div></div>
    <div class="player-panel team-black p-bottom" id="panel-3"><input type="text" value="AKRAM" id="name-3" class="p-name"><select id="bid-3" class="bid-sel"></select><div class="res-group"><button class="res-btn" id="w-3" onclick="setRes(3,'w')">W</button><button class="res-btn" id="l-3" onclick="setRes(3,'l')">L</button></div><div id="pop-3" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-3">0</div></div>
  </div>

  <div class="history-section">
    <div style="color:#ffd54f; text-align:center; padding:10px; font-weight:bold;">SCORE HISTORY</div>
    <table><thead><tr><th>RD</th><th id="th-0">MOH</th><th id="th-1">AME</th><th id="th-2">WAE</th><th id="th-3">AKR</th></tr></thead><tbody id="hist-body"></tbody></table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = { apiKey: "AIzaSyC9bc2wY9HkQW9k5Ln-ha7hm0IQr_nHX7s", authDomain: "score-400-33dc7.firebaseapp.com", databaseURL: "https://score-400-33dc7-default-rtdb.europe-west1.firebasedatabase.app", projectId: "score-400-33dc7" };
    const app = initializeApp(firebaseConfig); 
    const db = getDatabase(app); 
    const stateRef = ref(db, 'github_liveGame');
    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
    
    let round=1, totals=[0,0,0,0], roundRes=[null,null,null,null], teamWins=[0,0], dealerIdx=3, history=[], bidsLocked=false, matchLimit=1, currentBids=[2,2,2,2], lastDiffs=[0,0,0,0];
    let gameWinner = null, matchWinner = null, playerGameWins = [0,0,0,0];
    const scoreMap = {2:2, 3:3, 4:4, 5:10, 6:6, 7:14, 8:16, 9:27, 10:40};

    // --- REFINED HURRAY LOGIC ---
    window.playCheer = () => {
        const labelText = document.getElementById('win-team-label').innerText.toUpperCase();
        let shoutName = labelText.includes("RED") ? "Red" : "Black";
        
        window.speechSynthesis.cancel();
        
        const speak = (txt, rate, pitch) => {
            const msg = new SpeechSynthesisUtterance(txt);
            msg.rate = rate; msg.pitch = pitch;
            window.speechSynthesis.speak(msg);
        };

        speak(shoutName, 1.3, 1.0);
        speak(shoutName, 1.7, 1.3);
        speak(shoutName, 2.2, 1.6);
        
        setTimeout(() => speak("Victory is yours!", 1.0, 1.1), 200);
    };

    if(isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');

    onValue(stateRef, (snapshot) => {
      const data = snapshot.val(); if (!data) return;
      round = data.round || 1; 
      totals = data.totals || [0,0,0,0]; 
      teamWins = data.teamWins || [0,0]; 
      dealerIdx = data.dealerIdx ?? 3; 
      history = data.history || []; 
      matchLimit = data.matchLimit || 1; 
      bidsLocked = data.bidsLocked || false; 
      currentBids = data.currentBids || [2,2,2,2];
      roundRes = data.roundRes || [null,null,null,null]; 
      lastDiffs = data.lastDiffs || [0,0,0,0];
      gameWinner = data.gameWinner ?? null; 
      matchWinner = data.matchWinner ?? null; 
      playerGameWins = data.playerGameWins || [0,0,0,0];

      document.getElementById('m1').innerText = teamWins[0]; 
      document.getElementById('m2').innerText = teamWins[1]; 
      document.getElementById('match-type').value = matchLimit;
      document.getElementById('rd-info').innerText = `RD ${round} [${calculateRequiredTotal()}]`;
      
      for(let i=0; i<4; i++) {
        const nameVal = document.getElementById('name-'+i).value;
        document.getElementById('th-'+i).innerText = nameVal.substring(0,3).toUpperCase();
        document.getElementById('tot-'+i).innerText = totals[i];
        document.getElementById('tot-'+i).classList.toggle('dealer-active-score', i === dealerIdx);
        updateDropdownOptions(i);
        document.getElementById('bid-'+i).value = currentBids[i];
        document.getElementById('bid-'+i).disabled = !isAdmin || bidsLocked;
        document.getElementById('w-'+i).className = 'res-btn' + (roundRes[i] === 'w' ? ' win-active' : '');
        document.getElementById('l-'+i).className = 'res-btn' + (roundRes[i] === 'l' ? ' loss-active' : '');
        const popEl = document.getElementById('pop-'+i);
        if (lastDiffs[i] !== 0) { popEl.innerText = (lastDiffs[i] > 0 ? "+" : "") + lastDiffs[i]; popEl.style.color = lastDiffs[i] > 0 ? "#4caf50" : "#ff5252"; }
        else { popEl.innerText = ""; }
      }

      if (matchWinner !== null) {
        showOverlayUI(matchWinner, true);
      } else if (gameWinner !== null) {
        showOverlayUI(gameWinner, false);
      } else {
        document.getElementById('winner-overlay').style.display = 'none';
      }

      document.getElementById('bid-btn').innerText = bidsLocked ? "REBID" : "BID";
      document.getElementById('overlay-close-btn').style.display = isAdmin ? 'block' : 'none';
      renderHistory();
    });

    function calculateRequiredTotal() {
        let req = 11;
        for(let i=0; i<4; i++) { if(totals[i] >= 40) req = 13; else if(totals[i] >= 30 && req < 13) req = 12; }
        return req;
    }
    function getMinBidForScore(score) { if (score >= 40) return 4; if (score >= 30) return 3; return 2; }
    
    function updateDropdownOptions(i) {
      const s = document.getElementById('bid-'+i); s.innerHTML = '';
      let start = getMinBidForScore(totals[i]);
      for(let j=start; j<=10; j++){ let o = document.createElement('option'); o.value=j; o.innerText=j; s.appendChild(o); }
    }

    function showOverlayUI(teamIdx, isMatch) {
      const pIdx = teamIdx === 0 ? [0, 2] : [1, 3];
      const container = document.getElementById('mvp-list-container');
      const titleEl = document.getElementById('overlay-title');
      container.innerHTML = "";

      if (isMatch) {
        titleEl.innerHTML = "🏆 MATCH CHAMPIONS";
        titleEl.style.color = "#ffd54f";
        document.getElementById('win-team-label').innerText = teamIdx === 0 ? "TEAM RED DOMINATION" : "TEAM BLACK DOMINATION";
        
        let players = pIdx.map(i => ({ name: document.getElementById('name-'+i).value, val: playerGameWins[i] }));
        let maxWins = Math.max(...players.map(p => p.val));
        players.forEach(p => {
            const tag = (p.val === maxWins && p.val > 0) ? '<span class="mvp-badge">MATCH MVP</span>' : '';
            container.innerHTML += `<div class="player-row"><span>${p.name} (${p.val} Wins)${tag}</span></div>`;
        });
      } else {
        titleEl.innerHTML = "🏁 GAME OVER";
        titleEl.style.color = "#d32f2f";
        document.getElementById('win-team-label').innerText = teamIdx === 0 ? "TEAM RED" : "TEAM BLACK";
        
        let players = pIdx.map(i => ({ name: document.getElementById('name-'+i).value, val: totals[i] }));
        let maxScore = Math.max(...players.map(p => p.val));
        players.forEach(p => {
            const tag = p.val === maxScore ? '<span class="mvp-badge">MVP</span>' : '';
            container.innerHTML += `<div class="player-row"><span>${p.name} (${p.val})${tag}</span></div>`;
        });
      }
      document.getElementById('winner-overlay').style.display = 'flex';
    }

    window.handleNextClick = () => {
      if(!isAdmin) return;
      let tempTotals = [...totals];
      for(let i=0; i<4; i++) tempTotals[i] += lastDiffs[i];
      history.push({rd: round, s: [...tempTotals]});
      totals = [...tempTotals];

      let winT1 = ((totals[0] >= 41 && totals[2] >= 0) || (totals[2] >= 41 && totals[0] >= 0));
      let winT2 = ((totals[1] >= 41 && totals[3] >= 0) || (totals[3] >= 41 && totals[1] >= 0));

      if(winT1 || winT2) {
        let winIdx = (winT1 && winT2) ? (Math.max(totals[0], totals[2]) > Math.max(totals[1], totals[3]) ? 0 : 1) : (winT1 ? 0 : 1);
        const pIdx = winIdx === 0 ? [0, 2] : [1, 3];
        const topInTeam = totals[pIdx[0]] >= totals[pIdx[1]] ? pIdx[0] : pIdx[1];
        playerGameWins[topInTeam]++;
        if(totals[pIdx[0]] === totals[pIdx[1]]) playerGameWins[pIdx[1]]++; 
        teamWins[winIdx]++;
        gameWinner = winIdx;
        if(teamWins[winIdx] >= Math.ceil(matchLimit/2)) matchWinner = winIdx;
      } else {
        round++; dealerIdx = (dealerIdx + 1) % 4; bidsLocked = false; roundRes = [null,null,null,null]; lastDiffs = [0,0,0,0];
        currentBids = totals.map(t => getMinBidForScore(t));
      }
      pushState();
    };

    window.closeWinnerOverlay = () => {
      if(!isAdmin) return;
      gameWinner = null; 
      matchWinner = null; 
      pushState();
    };

    window.toggleBid = () => {
      if(!isAdmin) return;
      if(!bidsLocked) {
        let sum = 0, req = calculateRequiredTotal(), newBids = [];
        for(let i=0; i<4; i++) { let v = parseInt(document.getElementById('bid-'+i).value); sum += v; newBids.push(v); }
        if(sum < req) { window.showWarning(`MINIMUM BID: ${req}`); return; }
        bidsLocked = true; currentBids = newBids; roundRes = ['w','w','w','w']; 
        document.getElementById('calc-btn').disabled = false; document.getElementById('calc-btn').style.opacity = "1";
      } else {
        bidsLocked = false; lastDiffs = [0,0,0,0]; roundRes = [null,null,null,null];
        document.getElementById('calc-btn').disabled = true; document.getElementById('calc-btn').style.opacity = "0.4";
        document.getElementById('next-btn').disabled = true; document.getElementById('next-btn').style.opacity = "0.4";
      }
      pushState();
    };

    window.setRes = (i,r) => { if(!isAdmin) return; roundRes[i]=r; pushState(); };
    window.doCalc = () => {
      if(!isAdmin) return;
      lastDiffs = [0,1,2,3].map(i => {
        let b = currentBids[i]; let s = (totals[i] < 30) ? (scoreMap[b] || b) : b;
        return (roundRes[i] === 'w') ? s : -s;
      });
      document.getElementById('next-btn').disabled = false; document.getElementById('next-btn').style.opacity = "1";
      pushState();
    };

    window.manualReset = () => { round=1; totals=[0,0,0,0]; history=[]; bidsLocked=false; roundRes=[null,null,null,null]; lastDiffs=[0,0,0,0]; currentBids = [2,2,2,2]; gameWinner=null; matchWinner=null; };
    window.manualHardReset = () => { teamWins=[0,0]; playerGameWins=[0,0,0,0]; manualReset(); };
    window.handleReset = (sel) => { if(isAdmin && sel.value) { if(sel.value==='game' && confirm("Reset Game?")) manualReset(); if(sel.value==='match' && confirm("Wipe Match?")) manualHardReset(); sel.value=""; pushState(); } };
    window.moveDealer = () => { if(isAdmin) { dealerIdx = (dealerIdx+1)%4; pushState(); } };
    window.showWarning = (msg) => { document.getElementById('warning-msg').innerText = msg; document.getElementById('warning-overlay').style.display = 'flex'; };
    window.closeWarning = () => { document.getElementById('warning-overlay').style.display = 'none'; };
    window.changeMatchType = (val) => { if(isAdmin) { matchLimit = parseInt(val); pushState(); } };
    
    const pushState = () => { if(isAdmin) set(stateRef, { round, totals, teamWins, dealerIdx, history, matchLimit, bidsLocked, currentBids, roundRes, lastDiffs, gameWinner, matchWinner, playerGameWins }); };
    const renderHistory = () => { const hb = document.getElementById('hist-body'); hb.innerHTML = ""; history.slice().reverse().forEach(row => hb.innerHTML += `<tr><td>${row.rd}</td><td>${row.s[0]}</td><td>${row.s[1]}</td><td>${row.s[2]}</td><td>${row.s[3]}</td></tr>`); };

    window.announceScore = () => {
      const p = [0,1,2,3].map(i => {
        let n = document.getElementById(`name-${i}`).value;
        if (n.toUpperCase() === "WAEL") n = "Wah El"; 
        return { name: n, score: totals[i] };
      });
      const black = [p[1], p[3]].sort((a,b) => b.score - a.score);
      const red = [p[0], p[2]].sort((a,b) => b.score - a.score);
      const phrases = [`${black[0].name}, ${black[0].score}`, `${black[1].name}, ${black[1].score}`, `${red[0].name}, ${red[0].score}`, `${red[1].name}, ${red[1].score}`];
      let i = 0;
      function speakNext() {
        if (i < phrases.length) {
          const msg = new SpeechSynthesisUtterance(phrases[i]);
          msg.rate = 0.85;
          msg.onend = () => { i++; setTimeout(speakNext, 1200); };
          window.speechSynthesis.speak(msg);
        }
      }
      window.speechSynthesis.cancel();
      speakNext();
    };
  </script>
</body>
</html>
