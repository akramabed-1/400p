<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>400 PRO - ELITE EDITION</title>
  <style>
    body { margin: 0; padding: 0; background: #0b5b2e; font-family: sans-serif; color: white; overflow-x: hidden; display: flex; flex-direction: column; }
    
    #match-header { width: 100%; background: #064020; border-bottom: 3px solid #ffd54f; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; padding: 0 15px; box-sizing: border-box; flex-shrink: 0; }
    .score-box { min-width: 55px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; color: #fff; }
    .bg-red { background: #d32f2f; border: 2px solid white; }
    .bg-black { background: #000; border: 2px solid #555; }
    
    .top-ctrl { width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; box-sizing: border-box; margin-top: 10px; flex-shrink: 0; }
    .alz-btn, .reset-select { height: 35px; width: 85px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; cursor: pointer; outline: none; text-transform: uppercase; border: 2px solid; }
    .alz-btn { background: #ff5252; color: white; border-color: white; }
    .reset-select { background: #111; color: #ffd54f; border-color: #ffd54f; }

    /* Voice Icon - Moved to Bottom Right */
    .voice-btn-container { width: 100%; padding: 0 10px; box-sizing: border-box; display: flex; justify-content: flex-end; margin-top: -10px; z-index: 1100; }
    .voice-btn-circle { width: 45px; height: 45px; border-radius: 50%; background: #111; border: 2px solid #42a5f5; color: #42a5f5; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    .table-container { position: relative; width: 100vw; height: 100vh; min-height: 600px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-table { position: relative; width: 85vw; height: 85vw; max-width: 400px; max-height: 400px; background: radial-gradient(circle, #0f7b3c 0, #064020 85%); border-radius: 50%; }
    
    /* Maximized Central Panel */
    .center-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.92); padding: 15px 10px; border-radius: 15px; text-align: center; width: 110px; height: 160px; border: 2.5px solid #ffd54f; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; }
    
    /* Centered Text Large Buttons */
    .main-btn { background: #ffd54f; color: black; border: none; border-radius: 6px; font-weight: 900; width: 100%; font-size: 0.9rem; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-transform: uppercase; }

    .player-panel { position: absolute; border-radius: 12px; width: 120px; height: 180px; text-align: center; display: flex; flex-direction: column; box-shadow: 0 6px 15px rgba(0,0,0,0.5); z-index: 200; border: 1px solid #ccc; overflow: hidden; }
    .team-red { background: #fff5f5; }
    .team-black { background: #f4f4f4; }

    /* Player Positioning remains exactly 104px and 7px */
    .p-right { top: 50%; right: 7px; transform: translateY(-50%); }
    .p-left { top: 50%; left: 7px; transform: translateY(-50%); }
    .p-top { top: 104px; left: 50%; transform: translateX(-50%); }
    .p-bottom { bottom: 104px; left: 50%; transform: translateX(-50%); }

    .p-name { border: none; background: transparent; font-weight: 900; width: 100%; font-size: 0.85rem; text-align: center; color: #333; padding: 8px 0; }
    .p-tot-display { font-size: 1.9rem; font-weight: 900; background: rgba(0,0,0,0.05); margin-top: auto; padding: 8px 0; color: #333; border-top: 1px solid rgba(0,0,0,0.1); }
    .dealer-active-score { background: #ffd54f !important; }

    .history-section { background: #000; border-top: 4px solid #ffd54f; padding: 20px 10px 100px 10px; width: 100%; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th { color: #ffd54f; padding: 12px; border-bottom: 1px solid #333; font-size: 0.8rem; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 1.1rem; }
    .admin-only { display: none; }
  </style>
</head>
<body>
  <div id="match-header">
    <div style="display:flex; align-items:center; gap:5px;"><span style="color:#ffd54f;font-weight:900">RED</span><div class="score-box bg-red" id="m1">0</div></div>
    <select class="match-type-select" id="match-type" onchange="changeMatchType(this.value)" style="background: transparent; color: #ffd54f; border: none; font-weight: 900; font-size: 0.9rem; outline: none; cursor: pointer; text-align: center; -webkit-appearance: none;">
      <option value="1">SINGLE</option><option value="3">BO3</option><option value="5">BO5</option>
    </select>
    <div style="display:flex; align-items:center; gap:5px;"><div class="score-box bg-black" id="m2">0</div><span style="color:#ffd54f;font-weight:900">BLACK</span></div>
  </div>

  <div class="top-ctrl admin-only">
    <select class="reset-select" onchange="handleReset(this)"><option value="">RESET</option><option value="game">GAME</option><option value="match">MATCH</option></select>
    <button class="alz-btn" onclick="moveDealer()">ALZHEIMER</button>
  </div>

  <div class="table-container">
    <div class="card-table">
      <div class="center-panel">
        <div id="rd-info" style="color:#ffd54f; font-weight:bold; font-size: 0.75rem;">RD 1 [11]</div>
        <button id="bid-btn" class="main-btn admin-only" onclick="toggleBid()">BID</button>
        <button id="calc-btn" class="main-btn admin-only" onclick="doCalc()" disabled style="opacity:0.4">CALC</button>
        <button id="next-btn" class="main-btn admin-only" onclick="handleNextClick()" disabled style="opacity:0.4">NEXT</button>
      </div>
    </div>

    <div class="player-panel team-red p-right" id="panel-0"><input type="text" value="MOHAMAD" id="name-0" class="p-name" style="color:#d32f2f"><select id="bid-0" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-0" onclick="setRes(0,'w')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">W</button><button class="res-btn" id="l-0" onclick="setRes(0,'l')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">L</button></div><div id="pop-0" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-0">0</div></div>
    <div class="player-panel team-red p-left" id="panel-2"><input type="text" value="WAEL" id="name-2" class="p-name" style="color:#d32f2f"><select id="bid-2" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-2" onclick="setRes(2,'w')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">W</button><button class="res-btn" id="l-2" onclick="setRes(2,'l')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">L</button></div><div id="pop-2" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-2">0</div></div>
    <div class="player-panel team-black p-top" id="panel-1"><input type="text" value="AMER" id="name-1" class="p-name"><select id="bid-1" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-1" onclick="setRes(1,'w')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">W</button><button class="res-btn" id="l-1" onclick="setRes(1,'l')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">L</button></div><div id="pop-1" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-1">0</div></div>
    <div class="player-panel team-black p-bottom" id="panel-3"><input type="text" value="AKRAM" id="name-3" class="p-name"><select id="bid-3" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-3" onclick="setRes(3,'w')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">W</button><button class="res-btn" id="l-3" onclick="setRes(3,'l')" style="width:40px; height:40px; border-radius:6px; font-weight:900; border:1px solid #ccc; background:#fff; cursor:pointer;">L</button></div><div id="pop-3" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-3">0</div></div>
  </div>

  <div class="voice-btn-container admin-only">
    <div class="voice-btn-circle" onclick="announceScore()">🔊</div>
  </div>

  <div class="history-section">
    <div style="color:#ffd54f; text-align:center; padding:10px; font-weight:bold;">SCORE HISTORY</div>
    <table><thead><tr><th>RD</th><th>MOH</th><th>AME</th><th>WAE</th><th>AKR</th></tr></thead><tbody id="hist-body"></tbody></table>
  </div>
</body>
</html>
