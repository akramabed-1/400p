<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>400 PRO - Mobile Scroll</title>
  <style>
    /* Allow natural scrolling for history */
    html, body { margin: 0; padding: 0; background: #0b5b2e; font-family: sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
    
    #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #064020; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 1s ease-in-out; }
    #splash h1 { color: #ffd54f; font-size: 3.5rem; font-weight: 900; margin: 0; }
    
    #match-header { position: fixed; top: 0; width: 100%; background: #064020; border-bottom: 3px solid #ffd54f; display: flex; justify-content: space-around; align-items: center; z-index: 100; height: 60px; }
    .score-box { min-width: 50px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: #fff; }
    .bg-red { background: #d32f2f; border: 2px solid white; }
    .bg-black { background: #000; border: 2px solid #555; }

    /* The main table area takes exactly the phone screen height */
    .main-wrapper { display: flex; flex-direction: column; width: 100%; }
    .table-area { height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; padding-top: 60px; box-sizing: border-box; flex-shrink: 0; }
    
    .card-table { position: relative; width: 95%; max-width: 400px; height: 420px; background: radial-gradient(circle, #0f7b3c 0, #064020 85%); border-radius: 50px; display: flex; align-items: center; justify-content: center; }
    .center-panel { background: rgba(0,0,0,0.95); padding: 10px 5px; border-radius: 12px; text-align: center; width: 110px; border: 3px solid #ffd54f; z-index: 100; }
    .main-btn { background: #ffd54f; color: black; border: none; border-radius: 5px; font-weight: 900; width: 90%; margin: 4px 0; font-size: 0.85rem; padding: 10px 0; cursor: pointer; text-transform: uppercase; display: none; }

    /* Players - Fixed positions relative to the Green Table */
    .player-panel { position: absolute; background: white; color: #222; border-radius: 15px; width: 115px; height: 185px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; border: 4px solid transparent; }
    .dealer-active { border-color: #ffd54f !important; transform: scale(1.05); }
    .player-right { left: calc(50% + 70px); top: 50%; transform: translateY(-50%); }
    .player-left { left: calc(50% - 185px); top: 50%; transform: translateY(-50%); }
    .player-top { top: -100px; left: 50%; transform: translateX(-50%); }
    .player-bottom { bottom: -100px; left: 50%; transform: translateX(-50%); }
    
    .p-name { border: none; background: transparent; font-weight: 900; width: 100%; font-size: 0.85rem; text-align: center; text-transform: uppercase; }
    .bid-sel { width: 90%; border: 2px solid #ffd54f; font-size: 18px; font-weight: bold; height: 32px; margin: 2px auto; background: white; color: black; }
    .res-group { display: flex; justify-content: center; gap: 4px; margin: 2px 0; }
    .res-btn { width: 40px; height: 36px; border-radius: 4px; font-weight: 900; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .p-tot-display { font-size: 2rem; font-weight: 900; background: #f0f0f0; border-top: 1px solid #ddd; padding: 4px 0; margin-top: auto; }

    /* History section - Below the fold */
    .hist-container { width: 100%; background: #000; border-top: 4px solid #ffd54f; min-height: 300px; padding-bottom: 50px; }
    table { width: 100%; border-collapse: collapse; text-align: center; color: white; }
    th { background: #111; color: #ffd54f; padding: 15px; font-size: 0.9rem; position: sticky; top: 0; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 1rem; }
    
    .alz-btn { position: fixed; top: 68px; right: 10px; background: #ff5252; color: white; border: 2px solid white; border-radius: 8px; font-weight: 900; font-size: 0.6rem; padding: 8px 10px; z-index: 200; display: none; }
    #win-banner { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #fff; padding: 25px; border-radius: 20px; text-align: center; z-index: 1000; border: 5px solid #ffd54f; box-shadow: 0 0 100px rgba(0,0,0,0.9); }
  </style>
</head>
<body>

  <div id="splash"><h1>400 PRO</h1></div>

  <div id="match-header">
    <div style="display:flex; align-items:center; gap:5px;"><span style="color:#ffd54f;font-weight:900">RED</span><div class="score-box bg-red" id="m1">0</div></div>
    <select id="match-type-select" onchange="manualHardReset()" style="background:#222;color:#ffd54f;border:1px solid #ffd54f;font-weight:bold">
      <option value="1">SINGLE</option><option value="2">BO3</option><option value="3">BO5</option>
    </select>
    <div style="display:flex; align-items:center; gap:5px;"><div class="score-box bg-black" id="m2">0</div><span style="color:#ffd54f;font-weight:900">BLACK</span></div>
  </div>

  <button class="alz-btn" id="alz-btn" onclick="moveDealer()">ALZHEIMER</button>

  <div class="main-wrapper">
    <div class="table-area">
      <div class="card-table">
        <div class="center-panel">
          <div id="rd-info" style="color:#ffd54f; font-weight:bold; font-size: 0.8rem; margin-bottom: 2px;">RD 1 (11)</div>
          <button id="bid-btn" class="main-btn" onclick="toggleBid()">BID</button>
          <button id="calc-btn" class="main-btn" onclick="doCalc()" disabled>CALC</button>
          <button id="next-btn" class="main-btn" onclick="handleNextClick()" disabled>NEXT</button>
        </div>

        <div class="player-panel player-right" id="panel-0">
          <div style="padding:4px 0;"><input type="text" value="MOHAMAD" id="name-0" class="p-name" style="color:#d32f2f"></div>
          <select id="bid-0" class="bid-sel"></select>
          <div class="res-group"><button class="res-btn" id="w-0" onclick="setRes(0,'w')">W</button><button class="res-btn" id="l-0" onclick="setRes(0,'l')">L</button></div>
          <div id="pop-0" style="height:12px;font-size:0.75rem;font-weight:bold"></div>
          <div class="p-tot-display" id="tot-0" style="color:#d32f2f">0</div>
        </div>

        <div class="player-panel player-top" id="panel-1">
          <div style="padding:4px 0;"><input type="text" value="AMER" id="name-1" class="p-name"></div>
          <select id="bid-1" class="bid-sel"></select>
          <div class="res-group"><button class="res-btn" id="w-1" onclick="setRes(1,'w')">W</button><button class="res-btn" id="l-1" onclick="setRes(1,'l')">L</button></div>
          <div id="pop-1" style="height:12px;font-size:0.75rem;font-weight:bold"></div>
          <div class="p-tot-display" id="tot-1">0</div>
        </div>

        <div class="player-panel player-left" id="panel-2">
          <div style="padding:4px 0;"><input type="text" value="WAEL" id="name-2" class="p-name" style="color:#d32f2f"></div>
          <select id="bid-2" class="bid-sel"></select>
          <div class="res-group"><button class="res-btn" id="w-2" onclick="setRes(2,'w')">W</button><button class="res-btn" id="l-2" onclick="setRes(2,'l')">L</button></div>
          <div id="pop-2" style="height:12px;font-size:0.75rem;font-weight:bold"></div>
          <div class="p-tot-display" id="tot-2" style="color:#d32f2f">0</div>
        </div>

        <div class="player-panel player-bottom" id="panel-3">
          <div style="padding:4px 0;"><input type="text" value="AKRAM" id="name-3" class="p-name"></div>
          <select id="bid-3" class="bid-sel"></select>
          <div class="res-group"><button class="res-btn" id="w-3" onclick="setRes(3,'w')">W</button><button class="res-btn" id="l-3" onclick="setRes(3,'l')">L</button></div>
          <div id="pop-3" style="height:12px;font-size:0.75rem;font-weight:bold"></div>
          <div class="p-tot-display" id="tot-3">0</div>
        </div>
      </div>
      <div style="position:absolute; bottom:5px; color:#ffd54f; font-size:0.7rem; font-weight:bold; text-transform:uppercase;">Swipe up for History ↓</div>
    </div>

    <div class="hist-container">
      <table>
        <thead><tr><th>RD</th><th>Moh</th><th>Amer</th><th>Wael</th><th>Akr</th></tr></thead>
        <tbody id="hist-body"></tbody>
      </table>
    </div>
  </div>

  <div id="win-banner"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC9bc2wY9HkQW9k5Ln-ha7hm0IQr_nHX7s",
      authDomain: "score-400-33dc7.firebaseapp.com",
      databaseURL: "https://score-400-33dc7-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "score-400-33dc7",
      storageBucket: "score-400-33dc7.firebasestorage.app",
      messagingSenderId: "151401521482",
      appId: "1:151401521482:web:2d3ee46c226a15c18361b3",
      measurementId: "G-43ZD53RSTS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, 'github_liveGame');

    let round=1, totals=[0,0,0,0], roundRes=[null,null,null,null], teamWins=[0,0], dealerIdx=3, history=[], bidsLocked=false;
    const scoreMap = {2:2, 3:3, 4:4, 5:10, 6:6, 7:14, 8:16, 9:27, 10:40};
    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';

    // UI Permissions
    if (isAdmin) {
      document.querySelectorAll('.main-btn, .alz-btn').forEach(b => b.style.display = 'inline-block');
    } else {
      document.querySelectorAll('input, select, button').forEach(el => el.disabled = true);
      document.querySelectorAll('.res-btn').forEach(b => b.style.pointerEvents = 'none');
    }

    onValue(stateRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      round = data.round; totals = data.totals; teamWins = data.teamWins; dealerIdx = data.dealerIdx; history = data.history || [];
      
      document.getElementById('m1').innerText = teamWins[0];
      document.getElementById('m2').innerText = teamWins[1];
      let minB = totals.some(t=>t>=40)?13:(totals.some(t=>t>=30)?12:11);
      document.getElementById('rd-info').innerText = `RD ${round} (${minB})`;
      
      for(let i=0; i<4; i++) {
        document.getElementById('tot-'+i).innerText = totals[i];
        document.getElementById('panel-'+i).classList.remove('dealer-active');
      }
      document.getElementById('panel-'+dealerIdx).classList.add('dealer-active');

      const hb = document.getElementById('hist-body'); hb.innerHTML = "";
      history.forEach(row => hb.innerHTML += `<tr><td>${row.rd}</td><td>${row.s[0]}</td><td>${row.s[1]}</td><td>${row.s[2]}</td><td>${row.s[3]}</td></tr>`);

      if(data.winner) showWinBanner(data.winner);
      else document.getElementById('win-banner').style.display = 'none';
      
      if (!bidsLocked) updateDropdowns();
    });

    function updateDropdowns() {
      for(let i=0; i<4; i++){
        const s = document.getElementById('bid-'+i);
        s.innerHTML = '';
        let start = (totals[i] >= 40) ? 4 : (totals[i] >= 30) ? 3 : 2;
        for(let j=start; j<=10; j++){
          let o = document.createElement('option'); o.value=j; o.innerText=j; s.appendChild(o);
        }
        s.value = start;
        if (!isAdmin) s.disabled = true;
      }
    }

    window.moveDealer = () => { if(isAdmin) { dealerIdx = (dealerIdx+1)%4; pushState(); } };
    window.setRes = (i,r) => {
      if(!isAdmin) return;
      roundRes[i]=r;
      document.getElementById('w-'+i).style.background=(r==='w'?'#2e7d32':'');
      document.getElementById('l-'+i).style.background=(r==='l'?'#d32f2f':'');
    };

    window.toggleBid = () => {
      if(!isAdmin) return;
      if(!bidsLocked) {
        let sum=0; for(let i=0; i<4; i++) sum+=parseInt(document.getElementById('bid-'+i).value);
        let min = totals.some(t=>t>=40)?13:(totals.some(t=>t>=30)?12:11);
        if(sum < min) return alert("Total bids must be "+min);
        bidsLocked=true; document.getElementById('bid-btn').innerText="REBID";
        document.getElementById('calc-btn').disabled=false;
        for(let i=0; i<4; i++) { document.getElementById('bid-'+i).disabled=true; window.setRes(i,'w'); }
      } else {
        bidsLocked=false; document.getElementById('bid-btn').innerText="BID";
        document.getElementById('calc-btn').disabled=true;
        for(let i=0; i<4; i++) { document.getElementById('bid-'+i).disabled=false; resetRes(i); }
      }
    };

    function resetRes(i) {
      roundRes[i] = null;
      document.getElementById('w-'+i).style.background = '';
      document.getElementById('l-'+i).style.background = '';
    }

    window.doCalc = () => {
      if(!isAdmin) return;
      if(roundRes.includes(null)) return alert("Set W/L for all!");
      for(let i=0; i<4; i++){
        let b=parseInt(document.getElementById('bid-'+i).value);
        let s = (totals[i]<30) ? (scoreMap[b]||b) : b;
        let f = (roundRes[i]==='w')?s:-s;
        document.getElementById('pop-'+i).innerText=(f>0?"+":"")+f;
        document.getElementById('pop-'+i).style.color=f>0?"#4caf50":"#ff5252";
        document.getElementById('bid-'+i).setAttribute('data-last', f);
      }
      document.getElementById('next-btn').disabled=false;
    };

    window.handleNextClick = () => {
      if(!isAdmin) return;
      if(document.getElementById('win-banner').style.display === 'block') { manualReset(); return; }
      for(let i=0; i<4; i++) totals[i] += parseInt(document.getElementById('bid-'+i).getAttribute('data-last'));
      history.push({rd: round, s: [...totals]});
      let rW = (totals[0]>40||totals[2]>40) && totals[0]>=0 && totals[2]>=0;
      let bW = (totals[1]>40||totals[3]>40) && totals[1]>=0 && totals[3]>=0;
      if(rW || bW) {
        let team = (totals[0]+totals[2] > totals[1]+totals[3]) ? 'red' : 'black';
        if(team === 'red') teamWins[0]++; else teamWins[1]++;
        pushState({ type: "GAME", team, p1: team==='red'?"Mohamad":"Amer", s1: team==='red'?totals[0]:totals[1], p2: team==='red'?"Wael":"Akram", s2: team==='red'?totals[2]:totals[3] });
      } else {
        round++; dealerIdx=(dealerIdx+1)%4; bidsLocked=false;
        document.getElementById('bid-btn').innerText="BID";
        document.getElementById('calc-btn').disabled=true; document.getElementById('next-btn').disabled=true;
        for(let i=0; i<4; i++){ document.getElementById('bid-'+i).disabled=false; document.getElementById('pop-'+i).innerText=""; resetRes(i); }
        pushState();
      }
    };

    window.manualReset = () => { if(isAdmin) { round=1; totals=[0,0,0,0]; history=[]; bidsLocked=false; pushState(); } };
    window.manualHardReset = () => { if(isAdmin && confirm("Reset Match?")) { teamWins=[0,0]; manual
