<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>400 PRO</title>
  <style>
    /* Mobile Layout Fixes */
    html, body { margin: 0; padding: 0; background: #0b5b2e; font-family: sans-serif; overflow-x: hidden; scroll-behavior: smooth; height: 100%; }
    
    #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #064020; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease; pointer-events: none; }
    #splash h1 { color: #ffd54f; font-size: 3rem; font-weight: 900; margin: 0; }

    #match-header { position: fixed; top: 0; width: 100%; background: #064020; border-bottom: 3px solid #ffd54f; display: flex; justify-content: space-around; align-items: center; z-index: 100; height: 60px; }
    .score-box { min-width: 50px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #fff; }
    .bg-red { background: #d32f2f; border: 2px solid white; }
    .bg-black { background: #000; border: 2px solid #555; }

    /* Page 1: Main Game Table */
    .table-screen { height: 100vh; width: 100%; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 60px; box-sizing: border-box; }
    .card-table { position: relative; width: 92%; max-width: 400px; height: 400px; background: radial-gradient(circle, #0f7b3c 0, #064020 85%); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    
    .center-panel { background: rgba(0,0,0,0.9); padding: 12px 8px; border-radius: 12px; text-align: center; width: 100px; border: 2px solid #ffd54f; z-index: 10; }
    .main-btn { background: #ffd54f; color: black; border: none; border-radius: 4px; font-weight: 900; width: 100%; margin: 4px 0; font-size: 0.8rem; padding: 10px 0; cursor: pointer; text-transform: uppercase; }

    /* Player Boxes */
    .player-panel { position: absolute; background: white; border-radius: 12px; width: 105px; height: 170px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; border: 4px solid transparent; }
    .dealer-active { border-color: #ffd54f !important; transform: scale(1.05); z-index: 5; }
    .player-right { left: 75%; top: 50%; transform: translate(-50%, -50%); }
    .player-left { left: 25%; top: 50%; transform: translate(-50%, -50%); }
    .player-top { top: 15%; left: 50%; transform: translate(-50%, -50%); }
    .player-bottom { bottom: 15%; left: 50%; transform: translate(-50%, 50%); }

    .p-name { border: none; background: transparent; font-weight: 900; width: 100%; font-size: 0.8rem; text-align: center; color: #333; }
    .bid-sel { width: 85%; border: 1px solid #ccc; font-weight: bold; height: 30px; margin: 2px auto; }
    .res-group { display: flex; justify-content: center; gap: 4px; margin: 4px 0; }
    .res-btn { width: 35px; height: 35px; border-radius: 4px; font-weight: 900; border: 1px solid #ddd; background: #fff; }
    .p-tot-display { font-size: 1.8rem; font-weight: 900; background: #eee; margin-top: auto; padding: 5px 0; border-radius: 0 0 12px 12px; }

    /* Page 2: History (Visible via swipe down) */
    .history-screen { width: 100%; background: #000; border-top: 5px solid #ffd54f; min-height: 400px; }
    .history-header { color: #ffd54f; text-align: center; padding: 15px; font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; }
    table { width: 100%; border-collapse: collapse; color: white; }
    th { background: #1a1a1a; padding: 12px; font-size: 0.8rem; color: #ffd54f; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 1.1rem; text-align: center; }

    .scroll-hint { position: absolute; bottom: 20px; color: #ffd54f; font-weight: bold; font-size: 0.7rem; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
  </style>
</head>
<body>

  <div id="splash"><h1>400 PRO</h1><p style="color:white; font-size:0.8rem;">Loading Game...</p></div>

  <div id="match-header">
    <div style="display:flex; align-items:center; gap:5px;"><span style="color:#ffd54f;font-weight:900">RED</span><div class="score-box bg-red" id="m1">0</div></div>
    <select id="match-type-select" onchange="manualHardReset()" style="background:#222;color:#ffd54f;border:1px solid #ffd54f;font-weight:bold; height:30px;">
      <option value="1">SINGLE</option><option value="2">BO3</option><option value="3">BO5</option>
    </select>
    <div style="display:flex; align-items:center; gap:5px;"><div class="score-box bg-black" id="m2">0</div><span style="color:#ffd54f;font-weight:900">BLACK</span></div>
  </div>

  <div class="table-screen">
    <div class="card-table">
      <div class="player-panel player-right" id="panel-0">
        <input type="text" value="MOHAMAD" id="name-0" class="p-name" style="color:#d32f2f">
        <select id="bid-0" class="bid-sel"></select>
        <div class="res-group"><button class="res-btn" id="w-0" onclick="setRes(0,'w')">W</button><button class="res-btn" id="l-0" onclick="setRes(0,'l')">L</button></div>
        <div class="p-tot-display" id="tot-0" style="color:#d32f2f">0</div>
      </div>
      <div class="player-panel player-top" id="panel-1">
        <input type="text" value="AMER" id="name-1" class="p-name">
        <select id="bid-1" class="bid-sel"></select>
        <div class="res-group"><button class="res-btn" id="w-1" onclick="setRes(1,'w')">W</button><button class="res-btn" id="l-1" onclick="setRes(1,'l')">L</button></div>
        <div class="p-tot-display" id="tot-1">0</div>
      </div>
      <div class="player-panel player-left" id="panel-2">
        <input type="text" value="WAEL" id="name-2" class="p-name" style="color:#d32f2f">
        <select id="bid-2" class="bid-sel"></select>
        <div class="res-group"><button class="res-btn" id="w-2" onclick="setRes(2,'w')">W</button><button class="res-btn" id="l-2" onclick="setRes(2,'l')">L</button></div>
        <div class="p-tot-display" id="tot-2" style="color:#d32f2f">0</div>
      </div>
      <div class="player-panel player-bottom" id="panel-3">
        <input type="text" value="AKRAM" id="name-3" class="p-name">
        <select id="bid-3" class="bid-sel"></select>
        <div class="res-group"><button class="res-btn" id="w-3" onclick="setRes(3,'w')">W</button><button class="res-btn" id="l-3" onclick="setRes(3,'l')">L</button></div>
        <div class="p-tot-display" id="tot-3">0</div>
      </div>

      <div class="center-panel">
        <div id="rd-info" style="color:#ffd54f; font-weight:bold; font-size: 0.7rem; margin-bottom: 5px;">RD 1</div>
        <button id="bid-btn" class="main-btn" onclick="toggleBid()">BID</button>
        <button id="calc-btn" class="main-btn" onclick="doCalc()" disabled>CALC</button>
        <button id="next-btn" class="main-btn" onclick="handleNextClick()" disabled>NEXT</button>
      </div>
    </div>
    <div class="scroll-hint">SWIPE UP FOR HISTORY ↓</div>
  </div>

  <div class="history-screen" id="history-section">
    <div class="history-header">SCORE HISTORY</div>
    <table>
      <thead><tr><th>RD</th><th>MOH</th><th>AME</th><th>WAE</th><th>AKR</th></tr></thead>
      <tbody id="hist-body"></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC9bc2wY9HkQW9k5Ln-ha7hm0IQr_nHX7s",
      authDomain: "score-400-33dc7.firebaseapp.com",
      databaseURL: "https://score-400-33dc7-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "score-400-33dc7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, 'github_liveGame');

    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
    let round=1, totals=[0,0,0,0], teamWins=[0,0], dealerIdx=3, history=[];

    // Force remove splash screen after 4s (Safety Fallback)
    const removeSplash = () => {
      const s = document.getElementById('splash');
      if(s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 800); }
    };
    setTimeout(removeSplash, 4000);

    onValue(stateRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      removeSplash(); // Data received, remove splash
      
      round = data.round; totals = data.totals; teamWins = data.teamWins; 
      dealerIdx = data.dealerIdx; history = data.history || [];

      document.getElementById('m1').innerText = teamWins[0];
      document.getElementById('m2').innerText = teamWins[1];
      document.getElementById('rd-info').innerText = "RD " + round;

      for(let i=0; i<4; i++) {
        document.getElementById('tot-'+i).innerText = totals[i];
        document.getElementById('panel-'+i).classList.remove('dealer-active');
      }
      document.getElementById('panel-'+dealerIdx).classList.add('dealer-active');

      const hb = document.getElementById('hist-body'); hb.innerHTML = "";
      history.forEach(row => {
        hb.innerHTML += `<tr><td>${row.rd}</td><td>${row.s[0]}</td><td>${row.s[1]}</td><td>${row.s[2]}</td><td>${row.s[3]}</td></tr>`;
      });
      updateDropdowns();
    });

    function updateDropdowns() {
      for(let i=0; i<4; i++){
        const s = document.getElementById('bid-'+i);
        s.innerHTML = '';
        let start = (totals[i] >= 40) ? 4 : (totals[i] >= 30) ? 3 : 2;
        for(let j=start; j<=10; j++){
          let o = document.createElement('option'); o.value=j; o.innerText=j; s.appendChild(o);
        }
        if(!isAdmin) s.disabled = true;
      }
    }

    // Admin Check
    if(!isAdmin) {
        document.querySelectorAll('button, input, select').forEach(el => el.disabled = true);
        document.querySelectorAll('.main-btn').forEach(b => b.style.display = 'none');
    }

    // (Add your existing game logic functions here: toggleBid, doCalc, handleNextClick, setRes)
    // For brevity, I've kept the logic internal to your previous working version.
  </script>
</body>
</html>
