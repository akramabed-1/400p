<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>400 PRO - ELITE EDITION</title>
  <style>
    /* Natural scrolling flow */
    body { margin: 0; padding: 0; background: #0b5b2e; font-family: sans-serif; color: white; overflow-x: hidden; display: flex; flex-direction: column; }
    
    #match-header { width: 100%; background: #064020; border-bottom: 3px solid #ffd54f; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; padding: 0 15px; box-sizing: border-box; flex-shrink: 0; }
    .score-box { min-width: 55px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; color: #fff; }
    .bg-red { background: #d32f2f; border: 2px solid white; }
    .bg-black { background: #000; border: 2px solid #555; }
    
    .top-ctrl { width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; box-sizing: border-box; margin-top: 10px; flex-shrink: 0; }
    .alz-btn, .reset-select { height: 35px; width: 85px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; cursor: pointer; outline: none; text-transform: uppercase; border: 2px solid; }
    .alz-btn { background: #ff5252; color: white; border-color: white; }
    .reset-select { background: #111; color: #ffd54f; border-color: #ffd54f; }

    /* The Main Table Area - Exactly 100% of the first view */
    .table-container { position: relative; width: 100vw; height: calc(100vh - 120px); min-height: 580px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-table { position: relative; width: 85vw; height: 85vw; max-width: 400px; max-height: 400px; background: radial-gradient(circle, #0f7b3c 0, #064020 85%); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    
    /* Central Panel - Height adjusted to fill space without breaking buttons */
    .center-panel { background: rgba(0,0,0,0.92); padding: 10px; border-radius: 15px; text-align: center; width: 110px; height: 180px; border: 2.5px solid #ffd54f; z-index: 100; display: flex; flex-direction: column; justify-content: space-evenly; box-sizing: border-box; }
    
    /* Centered Text Buttons */
    .main-btn { background: #ffd54f; color: black; border: none; border-radius: 6px; font-weight: 900; width: 100%; font-size: 0.9rem; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-transform: uppercase; }

    .player-panel { position: absolute; border-radius: 12px; width: 120px; height: 180px; text-align: center; display: flex; flex-direction: column; box-shadow: 0 6px 15px rgba(0,0,0,0.5); z-index: 200; border: 1px solid #ccc; overflow: hidden; }
    .team-red { background: #fff5f5; }
    .team-black { background: #f4f4f4; }

    /* Alignment constants preserved */
    .p-right { top: 50%; right: 7px; transform: translateY(-50%); }
    .p-left { top: 50%; left: 7px; transform: translateY(-50%); }
    .p-top { top: 10px; left: 50%; transform: translateX(-50%); }
    .p-bottom { bottom: 10px; left: 50%; transform: translateX(-50%); }

    /* Voice Button - Bottom Right of the first screen section */
    .voice-btn-container { width: 100%; padding: 10px 20px; box-sizing: border-box; display: flex; justify-content: flex-end; flex-shrink: 0; }
    .voice-btn-circle { width: 50px; height: 50px; border-radius: 50%; background: #111; border: 2px solid #42a5f5; color: #42a5f5; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

    .p-name { border: none; background: transparent; font-weight: 900; width: 100%; font-size: 0.85rem; text-align: center; color: #333; padding: 8px 0; }
    .p-tot-display { font-size: 1.9rem; font-weight: 900; background: rgba(0,0,0,0.05); margin-top: auto; padding: 8px 0; color: #333; border-top: 1px solid rgba(0,0,0,0.1); }
    .dealer-active-score { background: #ffd54f !important; }
    .res-btn { width: 40px; height: 40px; border-radius: 6px; font-weight: 900; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    .win-active { background: #2e7d32 !important; color: white !important; }
    .loss-active { background: #d32f2f !important; color: white !important; }

    .history-section { background: #000; border-top: 4px solid #ffd54f; padding: 20px 10px 100px 10px; width: 100%; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; text-align: center; }
    th { color: #ffd54f; padding: 12px; border-bottom: 1px solid #333; font-size: 0.8rem; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 1.1rem; }
    .admin-only { display: none; }
  </style>
</head>
<body>
  <div id="match-header">
    <div style="display:flex; align-items:center; gap:5px;"><span style="color:#ffd54f;font-weight:900">RED</span><div class="score-box bg-red" id="m1">0</div></div>
    <select id="match-type" onchange="changeMatchType(this.value)" style="background:transparent; color:#ffd54f; border:none; font-weight:900; font-size:0.9rem; outline:none; -webkit-appearance: none;">
      <option value="1">SINGLE</option><option value="3">BO3</option><option value="5">BO5</option>
    </select>
    <div style="display:flex; align-items:center; gap:5px;"><div class="score-box bg-black" id="m2">0</div><span style="color:#ffd54f;font-weight:900">BLACK</span></div>
  </div>

  <div class="top-ctrl admin-only">
    <select class="reset-select" onchange="handleReset(this)"><option value="">RESET</option><option value="game">GAME</option><option value="match">MATCH</option></select>
    <button class="alz-btn" onclick="moveDealer()">ALZHEIMER</button>
  </div>

  <div class="table-container">
    <div class="card-table">
      <div class="center-panel">
        <div id="rd-info" style="color:#ffd54f; font-weight:bold; font-size: 0.75rem;">RD 1 [11]</div>
        <button id="bid-btn" class="main-btn admin-only" onclick="toggleBid()">BID</button>
        <button id="calc-btn" class="main-btn admin-only" onclick="doCalc()" disabled style="opacity:0.4">CALC</button>
        <button id="next-btn" class="main-btn admin-only" onclick="handleNextClick()" disabled style="opacity:0.4">NEXT</button>
      </div>
    </div>

    <div class="player-panel team-red p-right" id="panel-0"><input type="text" value="MOHAMAD" id="name-0" class="p-name" style="color:#d32f2f"><select id="bid-0" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-0" onclick="setRes(0,'w')">W</button><button class="res-btn" id="l-0" onclick="setRes(0,'l')">L</button></div><div id="pop-0" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-0">0</div></div>
    <div class="player-panel team-red p-left" id="panel-2"><input type="text" value="WAEL" id="name-2" class="p-name" style="color:#d32f2f"><select id="bid-2" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-2" onclick="setRes(2,'w')">W</button><button class="res-btn" id="l-2" onclick="setRes(2,'l')">L</button></div><div id="pop-2" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-2">0</div></div>
    <div class="player-panel team-black p-top" id="panel-1"><input type="text" value="AMER" id="name-1" class="p-name"><select id="bid-1" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-1" onclick="setRes(1,'w')">W</button><button class="res-btn" id="l-1" onclick="setRes(1,'l')">L</button></div><div id="pop-1" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-1">0</div></div>
    <div class="player-panel team-black p-bottom" id="panel-3"><input type="text" value="AKRAM" id="name-3" class="p-name"><select id="bid-3" style="width:90%; margin:0 auto; height:28px; font-weight:bold; font-size:1.1rem; color:#000;"></select><div style="display: flex; justify-content: center; gap: 6px; margin: 4px 0;"><button class="res-btn" id="w-3" onclick="setRes(3,'w')">W</button><button class="res-btn" id="l-3" onclick="setRes(3,'l')">L</button></div><div id="pop-3" style="height:15px; font-size:0.8rem; font-weight:bold;"></div><div class="p-tot-display" id="tot-3">0</div></div>
  </div>

  <div class="voice-btn-container admin-only">
    <div class="voice-btn-circle" onclick="announceScore()">🔊</div>
  </div>

  <div class="history-section">
    <div style="color:#ffd54f; text-align:center; padding:10px; font-weight:bold;">SCORE HISTORY</div>
    <table><thead><tr><th>RD</th><th>MOH</th><th>AME</th><th>WAE</th><th>AKR</th></tr></thead><tbody id="hist-body"></tbody></table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyC9bc2wY9HkQW9k5Ln-ha7hm0IQr_nHX7s", authDomain: "score-400-33dc7.firebaseapp.com", databaseURL: "https://score-400-33dc7-default-rtdb.europe-west1.firebasedatabase.app", projectId: "score-400-33dc7" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app); const stateRef = ref(db, 'github_liveGame');
    const isAdmin = new URLSearchParams(window.location.search).get('role') === 'admin';
    if(isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');

    let round=1, totals=[0,0,0,0], roundRes=[null,null,null,null], teamWins=[0,0], dealerIdx=3, history=[], bidsLocked=false, matchLimit=1, currentBids=[2,2,2,2], lastDiffs=[0,0,0,0], gameStatus=null;
    const scoreMap = {2:2, 3:3, 4:4, 5:10, 6:6, 7:14, 8:16, 9:27, 10:40};

    onValue(stateRef, (snapshot) => {
      const data = snapshot.val(); if (!data) return;
      round=data.round; totals=data.totals; teamWins=data.teamWins; dealerIdx=data.dealerIdx; history=data.history||[]; bidsLocked=data.bidsLocked||false; currentBids=data.currentBids||[2,2,2,2]; roundRes=data.roundRes||[null,null,null,null]; lastDiffs=data.lastDiffs||[0,0,0,0]; matchLimit=data.matchLimit||1;

      document.getElementById('m1').innerText=teamWins[0]; document.getElementById('m2').innerText=teamWins[1];
      document.getElementById('rd-info').innerText=`RD ${round} [${calculateRequiredTotal()}]`;
      for(let i=0; i<4; i++){
        document.getElementById('tot-'+i).innerText=totals[i];
        document.getElementById('tot-'+i).classList.toggle('dealer-active-score', i===dealerIdx);
        updateDropdown(i); document.getElementById('bid-'+i).value=currentBids[i];
        document.getElementById('bid-'+i).disabled=!isAdmin||bidsLocked;
        document.getElementById('w-'+i).className='res-btn'+(roundRes[i]==='w'?' win-active':'');
        document.getElementById('l-'+i).className='res-btn'+(roundRes[i]==='l'?' loss-active':'');
        const pop=document.getElementById('pop-'+i); pop.innerText=lastDiffs[i]!==0?(lastDiffs[i]>0?"+":"")+lastDiffs[i]:"";
      }
      document.getElementById('bid-btn').innerText=bidsLocked?"REBID":"BID";
      document.getElementById('calc-btn').disabled=!bidsLocked; document.getElementById('calc-btn').style.opacity=bidsLocked?"1":"0.4";
      renderHistory();
    });

    function calculateRequiredTotal(){ let r=11; for(let i=0;i<4;i++){ if(totals[i]>=40)r=13;else if(totals[i]>=30&&r<13)r=12; } return r; }
    function updateDropdown(i){ const s=document.getElementById('bid-'+i); s.innerHTML=''; let min=totals[i]>=40?4:totals[i]>=30?3:2; for(let j=min;j<=10;j++){ let o=document.createElement('option'); o.value=j; o.innerText=j; s.appendChild(o); } }
    window.setRes=(i,r)=>{ if(isAdmin){roundRes[i]=r; pushState();}};
    window.toggleBid=()=>{ if(!isAdmin)return; if(!bidsLocked){ let sum=0; for(let i=0;i<4;i++)sum+=parseInt(document.getElementById('bid-'+i).value); if(sum<calculateRequiredTotal()){alert("Check bids!"); return;} bidsLocked=true; currentBids=[0,1,2,3].map(i=>parseInt(document.getElementById('bid-'+i).value)); roundRes=['w','w','w','w']; } else { bidsLocked=false; } pushState(); };
    window.doCalc=()=>{ if(!isAdmin)return; lastDiffs=currentBids.map((b,i)=>{ let s=(totals[i]<30)?(scoreMap[b]||b):b; return roundRes[i]==='w'?s:-s; }); document.getElementById('next-btn').disabled=false; document.getElementById('next-btn').style.opacity="1"; pushState(); };
    window.handleNextClick=()=>{ if(!isAdmin)return; for(let i=0;i<4;i++)totals[i]+=lastDiffs[i]; history.push({rd:round, s:[...totals]}); round++; dealerIdx=(dealerIdx+1)%4; bidsLocked=false; roundRes=[null,null,null,null]; lastDiffs=[0,0,0,0]; document.getElementById('next-btn').disabled=true; document.getElementById('next-btn').style.opacity="0.4"; pushState(); };
    window.moveDealer=()=>{ if(isAdmin){dealerIdx=(dealerIdx+1)%4; pushState();} };
    window.handleReset=(s)=>{ if(isAdmin&&s.value&&confirm("Reset?")){ if(s.value==='game'){round=1;totals=[0,0,0,0];history=[];}else{teamWins=[0,0];round=1;totals=[0,0,0,0];history=[];} pushState(); s.value=""; } };
    const pushState=(e={})=>set(stateRef,{round,totals,teamWins,dealerIdx,history,matchLimit,bidsLocked,currentBids,roundRes,lastDiffs,...e});
    const renderHistory=()=>{ const hb=document.getElementById('hist-body'); hb.innerHTML=""; history.slice().reverse().forEach(r=>hb.innerHTML+=`<tr><td>${r.rd}</td><td>${r.s[0]}</td><td>${r.s[1]}</td><td>${r.s[2]}</td><td>${r.s[3]}</td></tr>`); };
    window.announceScore=()=>{ const p=[0,1,2,3].map(i=>({n:document.getElementById('name-'+i).value, s:totals[i]})); const txt=`Score is: Red Team ${p[0].s} and ${p[2].s}. Black Team ${p[1].s} and ${p[3].s}`; const u=new SpeechSynthesisUtterance(txt); window.speechSynthesis.speak(u); };
  </script>
</body>
</html>
