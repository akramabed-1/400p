<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>400 PRO - Instant Load</title>
  <style>
    /* Full height setup with scrolling enabled for history */
    html, body { margin: 0; padding: 0; background: #0b5b2e; font-family: sans-serif; overflow-x: hidden; scroll-behavior: smooth; height: 100%; }
    
    #match-header { position: fixed; top: 0; width: 100%; background: #064020; border-bottom: 3px solid #ffd54f; display: flex; justify-content: space-around; align-items: center; z-index: 100; height: 60px; }
    .score-box { min-width: 50px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #fff; }
    .bg-red { background: #d32f2f; border: 2px solid white; }
    .bg-black { background: #000; border: 2px solid #555; }

    /* Admin UI: Reset Left, Alzheimer Right */
    .admin-only { display: none; }
    .top-ctrl { position: fixed; top: 68px; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; z-index: 200; }
    .alz-btn { background: #ff5252; color: white; border: 2px solid white; border-radius: 8px; font-weight: 900; font-size: 0.65rem; padding: 10px; cursor: pointer; }
    .reset-select { background: #222; color: #ffd54f; border: 2px solid #ffd54f; border-radius: 8px; font-weight: 900; font-size: 0.7rem; padding: 8px; cursor: pointer; height: 38px; }

    /* Page Layout */
    .table-screen { height: 100vh; width: 100%; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 60px; box-sizing: border-box; flex-shrink: 0; }
    .card-table { position: relative; width: 92%; max-width: 400px; height: 440px; background: radial-gradient(circle, #0f7b3c 0, #064020 85%); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    
    .center-panel { background: rgba(0,0,0,0.9); padding: 10px 5px; border-radius: 12px; text-align: center; width: 105px; border: 2px solid #ffd54f; z-index: 10; }
    .main-btn { background: #ffd54f; color: black; border: none; border-radius: 4px; font-weight: 900; width: 100%; margin: 4px 0; font-size: 0.8rem; padding: 12px 0; cursor: pointer; text-transform: uppercase; }

    /* Player Panels */
    .player-panel { position: absolute; background: white; border-radius: 12px; width: 105px; height: 175px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; border: 4px solid transparent; }
    .dealer-active { border-color: #ffd54f !important; transform: scale(1.05); z-index: 5; }
    .player-right { left: 78%; top: 50%; transform: translate(-50%, -50%); }
    .player-left { left: 22%; top: 50%; transform: translate(-50%, -50%); }
    .player-top { top: 12%; left: 50%; transform: translate(-50%, -50%); }
    .player-bottom { bottom: 12%; left: 50%; transform: translate(-50%, 50%); }

    .p-name { border: none; background: transparent; font-weight: 900; width: 100%; font-size: 0.8rem; text-align: center; color: #333; }
    .bid-sel { width: 85%; border: 1px solid #ccc; font-weight: bold; height: 32px; margin: 2px auto; }
    .res-group { display: flex; justify-content: center; gap: 4px; margin: 4px 0; }
    .res-btn { width: 38px; height: 38px; border-radius: 4px; font-weight: 900; border: 1px solid #ddd; background: #fff; cursor: pointer; }
    .p-tot-display { font-size: 1.8rem; font-weight: 900; background: #eee; margin-top: auto; padding: 5px 0; border-radius: 0 0 12px 12px; }

    /* History below the screen */
    .history-screen { width: 100%; background: #000; border-top: 5px solid #ffd54f; min-height: 400px; padding-bottom: 50px; }
    table { width: 100%; border-collapse: collapse; color: white; text-align: center; }
    th { background: #111; padding: 15px; color: #ffd54f; font-size: 0.8rem; }
    td { padding: 12px; border-bottom: 1px solid #222; font-size: 1.1rem; }
  </style>
</head>
<body>

  <div id="match-header">
    <div style="display:flex; align-items:center; gap:5px;"><span style="color:#ffd54f;font-weight:900">RED</span><div class="score-box bg-red" id="m1">0</div></div>
    <div id="admin-indicator" style="color:#ffd54f; font-weight:bold; font-size:0.5rem; border:1px solid #ffd54f; padding:2px 4px; border-radius:4px; display:none;">ADMIN MODE</div>
    <div style="display:flex; align-items:center; gap:5px;"><div class="score-box bg-black" id="m2">0</div><span style="color:#ffd54f;font-weight:900">BLACK</span></div>
  </div>

  <div class="top-ctrl admin-only" id="top-ctrl-bar">
    <select class="reset-select" onchange="handleReset(this)">
      <option value="">RESET MENU</option>
      <option value="game">NEW GAME (SCORES 0)</option>
      <option value="match">NEW MATCH (FULL WIPE)</option>
    </select>
    <button class="alz-btn" onclick="moveDealer()">ALZHEIMER</button>
  </div>

  <div class="table-screen">
    <div class="card-table">
      <div class="player-panel player-right" id="panel-0">
        <input type="text" value="MOHAMAD" id="name-0" class="p-name" style="color:#d32f2f">
        <select id="bid-0" class="bid-sel"></select>
        <div class="res-group"><button class="res-btn" id="w-0" onclick="setRes(0,'w')">W</button><button class="res-btn" id="l-0" onclick="setRes(0,'l')">L</button></div>
        <div id="pop-0" style="height:12px;font-size:0.75rem;font-weight:bold"></div>
        <div class="p-tot-display" id="tot-0" style="color:#d32f2f">0</div>
      </div>
      <div class="player-panel player-top" id="panel-1">
        <input type="text" value="AMER" id="name-1" class="p-name
